services:
  gitlab-mcp:
    image: zereight050/gitlab-mcp:latest
    container_name: gitlab-mcp
    profiles: ["gitlab"]
    environment:
      - STREAMABLE_HTTP=true
      - REMOTE_AUTHORIZATION=true
      - HOST=0.0.0.0
      - PORT=3002
      - GITLAB_API_URL=${GITLAB_API_URL:-https://gitlab.com/api/v4}
      - GITLAB_DENIED_TOOLS_REGEX=^delete_|update_default_branch|create_or_update_file|unprotect_branch|merge_merge_request
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  claude-dev-env:
    container_name: claude-dev-env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_VERSION: ${UV_VERSION}
        CLANG_VERSION: ${CLANG_VERSION}
        RUST_VERSION: ${RUST_VERSION}
        CONAN_VERSION: ${CONAN_VERSION}
        NODE_VERSION: ${NODE_VERSION:-22}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        DEV_UID: ${DEV_UID:-1000}
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITLAB_API_TOKEN=${GITLAB_API_TOKEN:-}
      - GITLAB_API_URL=${GITLAB_API_URL}
    volumes:
      - ${CLAUDE_HOME:-~/.claude}:/home/dev/.claude
      - ${PROJECT_DIR:-./workspace}:/workspace
    command: ["python3", "/entrypoint.py"]
    working_dir: /workspace
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      gitlab-mcp:
        condition: service_healthy
        required: false
