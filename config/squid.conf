# Forward-proxy (Squid) — allowlist egress, no TLS MITM.
# Host-editable, mounted read-only into the container. NO secrets.
# Applies in stage 02 (forward-proxy).
# Details: docs/design/agentic-workflow/02-forward-proxy/03-squid-config.md

# --- Listen, internal only ---
http_port 3128
visible_hostname forward-proxy

# --- Allowlist from file (one domain per line, .domain = includes subdomains) ---
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# --- SNI peek for HTTPS (no bump/decrypt) ---
acl step1 at_step SslBump1
ssl_bump peek step1
acl allowed_sni ssl::server_name "/etc/squid/allowlist.txt"
ssl_bump splice allowed_sni        # allowed SNI -> pass through, do NOT decrypt
ssl_bump terminate all             # everything else: terminate the connection

# --- Restrict ports: 80/443 only ---
acl safe_ports port 80 443
acl CONNECT method CONNECT
http_access deny CONNECT !safe_ports

# --- Plain HTTP: allowed hosts only ---
http_access allow allowed_domains
http_access deny all               # DEFAULT-DENY

# --- No caching (avoid cache poisoning/disk state), filter + audit only ---
cache deny all

# --- Audit log: every connection, machine-readable ---
logformat audit %ts.%03tu %>a %Ss/%03>Hs %<st %rm %ru %ssl::>sni
access_log /var/log/squid/access.log audit
