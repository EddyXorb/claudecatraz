# Forward-Proxy (Squid) — Research/Build-Egress, default-deny Allowlist.
# Realisiert docs/design/agentic-workflow/02-forward-proxy/03-squid-config.md.
#
# Host-editierbar, read-only in den Container gemountet (README §11). KEINE Secrets.
# Reload ohne Neustart:  docker compose exec forward-proxy squid -k reconfigure

# --- Lauschen, nur intern (agent-net) ---
# `ssl-bump` aktiviert die Peek/Splice-Engine; `tls-cert` ist nur Init-Material,
# es wird beim Splicing NIE dem Client praesentiert (kein CA im Agenten, §3).
http_port 3128 ssl-bump tls-cert=/etc/squid/ssl/bump.pem
visible_hostname forward-proxy

# certgen-Helper: Squid startet ihn bei aktivem ssl-bump, auch wenn wir nur
# peek/splice (nie bump). DB liegt auf tmpfs, vom Entrypoint initialisiert.
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/spool/squid/ssl_db -M 4MB
sslcrtd_children 4

# --- ACL-Grundlagen (localhost/all sind in Squid eingebaut) ---
acl safe_ports port 80 443
acl CONNECT method CONNECT

# --- Allowlist aus Datei (eine Domain je Zeile, .domain = inkl. Subdomains) ---
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# --- SNI-peek fuer HTTPS (kein Bump/Decrypt) ---
acl step1 at_step SslBump1
ssl_bump peek step1
acl allowed_sni ssl::server_name "/etc/squid/allowlist.txt"
ssl_bump splice allowed_sni        # erlaubter SNI -> durchreichen, NICHT entschluesseln
ssl_bump terminate all             # alles andere: Verbindung beenden

# --- Ports einschraenken: nur 80/443 ---
http_access deny CONNECT !safe_ports

# --- Plain-HTTP / CONNECT: nur erlaubte Hosts ---
http_access allow allowed_domains
http_access deny all               # DEFAULT-DENY

# --- Kein Caching (Cache-Poisoning/Disk vermeiden), nur Filter + Audit ---
cache deny all

# --- Audit-Log: jede Verbindung, maschinenlesbar (Zeit, Client, Status, Methode, URL, SNI) ---
logformat audit %ts.%03tu %>a %Ss/%03>Hs %<st %rm %ru %ssl::>sni
access_log stdio:/var/log/squid/access.log audit

# --- DNS: deterministisch ueber den Docker-Resolver (egress-net). Optional hart setzen:
# dns_nameservers 1.1.1.1 8.8.8.8

# --- Betrieb (read-only Root-FS: PID/Spool/Tmp liegen auf tmpfs) ---
pid_filename /var/run/squid.pid
shutdown_lifetime 5 seconds
