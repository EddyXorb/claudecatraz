# Warden — nicht-geheime Policy-Parameter. Host-editierbar, read-only gemountet.
# Secrets (GITLAB_READ_TOKEN / GITLAB_WRITE_TOKEN / GITLAB_URL) kommen aus .env.
# Details: docs/design/agentic-workflow/02-warden.md (W10)

branch_prefix       = "claude/"          # R2: nur Branches mit diesem Präfix erlaubt
max_open_mrs        = 5                   # R5: max. gleichzeitig offene MRs
max_open_branches   = 10                  # R5: max. gleichzeitig existierende Branches
max_writes_per_hour = 60                  # R5: max. schreibende Aktionen pro Stunde
allowed_projects    = ["untis-org/optimization-team/opt/opt-ci"]   # leer = fail-closed!
