# Warden — NICHT-geheime Tunables. Host-editierbar, read-only gemountet.
# KEINE Tokens hier! Secrets (GITLAB_READ_TOKEN/GITLAB_WRITE_TOKEN) kommen aus .env.
# Wirkt für Stufe 02 (Warden).
# Details: docs/design/agentic-workflow/02-warden.md (W10)

branch_prefix        = "claude/"          # R2: nur Branches mit diesem Präfix
max_open_mrs         = 5                   # R5
max_open_branches    = 10                  # R5
max_writes_per_hour  = 60                  # R5
allowed_projects     = ["group/proj-a", "group/proj-b"]   # leer => fail-closed!
gitlab_api_url       = "https://gitlab.com/api/v4"
gitlab_git_base      = "https://gitlab.com"
reconcile_interval_s = 300
state_db_path        = "/var/lib/warden/state.db"
audit_log_path       = "/var/log/warden/audit.jsonl"

# Datengetriebene Write-Endpoint-Allowlist (W6.1) — entweder hier als [[write_endpoints]]
# oder in einer Schwesterdatei. Branch-Löschung ist nie erlaubt (R2, W7.2).
