name: cli CI

# The catraz CLI: smoke-check it imports/runs and its unit tests pass.
on:
  push:
    paths:
      - "catraz"
      - "src/catraz/**"
      - "pyproject.toml"
      - "tests/cli/**"
      - "tests/container/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    paths:
      - "catraz"
      - "src/catraz/**"
      - "pyproject.toml"
      - "tests/cli/**"
      - "tests/container/**"
      - ".github/workflows/cli-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format-Check (ruff)
        run: uv run ruff format --check .

      - name: Smoke (help + version)
        run: |
          ./catraz --help
          ./catraz --version
          ./catraz run --help

      - name: Type-check (mypy --strict)
        run: uv run mypy

      - name: Unit tests
        run: uv run --with pytest python -m pytest tests/cli/ tests/container/ -q
