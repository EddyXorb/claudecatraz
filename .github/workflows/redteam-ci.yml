name: redteam CI

# Shadow-mount and trust-boundary negative tests (require Docker).
# CI gates T2, T7a, T8 — docker-primitive tests that use only `docker run alpine`
# (no catraz stack, no API key needed). The @slow tests T1/T3/T4 require a live
# catraz stack + real ANTHROPIC_API_KEY and must be run manually/locally.
on:
  push:
    paths:
      - "src/catraz/**"
      - "pyproject.toml"
      - "tests/redteam/**"
      - ".github/workflows/redteam-ci.yml"
  pull_request:
    paths:
      - "src/catraz/**"
      - "pyproject.toml"
      - "tests/redteam/**"
      - ".github/workflows/redteam-ci.yml"

jobs:
  redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Red-team tests (Docker available, stack-free primitives only)
        run: uv run --with pytest python -m pytest tests/redteam/ -m "not slow" -q
