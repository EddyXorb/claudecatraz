name: compose validate

on:
  push:
    paths:
      - "src/catraz/assets/compose/docker-compose.yml"
      - "src/catraz/assets/.env.example"
      - ".github/workflows/compose-validate.yml"
  pull_request:
    paths:
      - "src/catraz/assets/compose/docker-compose.yml"
      - "src/catraz/assets/.env.example"
      - ".github/workflows/compose-validate.yml"

env:
  COMPOSE_FILE: src/catraz/assets/compose/docker-compose.yml
  ENV_EXAMPLE: src/catraz/assets/.env.example

jobs:
  syntax:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate CI env file from .env.example
        run: |
          # Uncomment all "# VAR=..." lines so docker compose config has no
          # missing-variable warnings for stage-02 vars.
          python3 - <<'EOF'
          import os, re, sys
          seen = set()
          lines = []
          with open(os.environ["ENV_EXAMPLE"]) as f:
              for line in f:
                  line = line.rstrip("\n")
                  # Uncomment "# VAR=value" → "VAR=value"
                  m = re.match(r'^#\s*([A-Z_][A-Z0-9_]*)=(.*)', line)
                  if m:
                      var = m.group(1)
                      if var not in seen:
                          lines.append(f"{var}={m.group(2)}")
                          seen.add(var)
                  elif re.match(r'^[A-Z_][A-Z0-9_]*=', line):
                      var = line.split("=")[0]
                      if var not in seen:
                          lines.append(line)
                          seen.add(var)
          # PROJECT_DIR is now mandatory (catraz sets it); supply a placeholder for config.
          if "PROJECT_DIR" not in seen:
              lines.append("PROJECT_DIR=/tmp/catraz-ci")
              seen.add("PROJECT_DIR")
          # CATRAZ_ASSETS is injected by the catraz CLI at runtime (the extracted asset cache,
          # anchoring build contexts). `config` only interpolates/validates, so a placeholder
          # path that need not exist is enough to satisfy the ${CATRAZ_ASSETS:?…} requirement.
          if "CATRAZ_ASSETS" not in seen:
              lines.append("CATRAZ_ASSETS=/tmp/catraz-ci-assets")
              seen.add("CATRAZ_ASSETS")
          with open("/tmp/ci.env", "w") as out:
              out.write("\n".join(lines) + "\n")
          print("vars exported:", ", ".join(sorted(seen)), file=sys.stderr)
          EOF

      - name: Validate compose syntax
        run: |
          PROJECT_DIR=/tmp/catraz-ci CATRAZ_ASSETS=/tmp/catraz-ci-assets docker compose \
            -f "$COMPOSE_FILE" \
            --project-directory /tmp/catraz-ci \
            --env-file /tmp/ci.env config --quiet
          echo "docker compose config: OK"

  env-coverage:
    name: .env.example coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: All compose variables documented in .env.example
        run: |
          python3 - <<'EOF'
          import os, re, sys

          with open(os.environ["COMPOSE_FILE"]) as f:
              compose = f.read()

          # ${VAR} and ${VAR:-default}
          compose_vars = set(re.findall(r'\$\{([A-Z_][A-Z0-9_]*)(?::-[^}]*)?\}', compose))

          # PROJECT_DIR and HOST_GITCONFIG are injected by catraz at runtime
          # (the latter points at the host ~/.gitconfig, else /dev/null) — not
          # documented .env values.
          compose_vars.discard("PROJECT_DIR")
          compose_vars.discard("HOST_GITCONFIG")

          # All vars in .env.example, including commented-out stage-02 entries
          example_vars = set()
          with open(os.environ["ENV_EXAMPLE"]) as f:
              for line in f:
                  m = re.match(r'^#?\s*([A-Z_][A-Z0-9_]*)=', line)
                  if m:
                      example_vars.add(m.group(1))

          missing = compose_vars - example_vars
          if missing:
              print("ERROR: compose variables not documented in .env.example:")
              for v in sorted(missing):
                  print(f"  {v}")
              sys.exit(1)

          print("OK: all compose variables are documented in .env.example")
          print("Checked:", ", ".join(sorted(compose_vars)))
          EOF
