name: squid CI

on:
  push:
    paths:
      - "forward-proxy/**"
      - "src/catraz/assets/config/squid.conf"
      - "src/catraz/assets/config/allowlist.txt"
      - ".github/workflows/squid-ci.yml"
  pull_request:
    paths:
      - "forward-proxy/**"
      - "src/catraz/assets/config/squid.conf"
      - "src/catraz/assets/config/allowlist.txt"
      - ".github/workflows/squid-ci.yml"

jobs:
  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build forward-proxy image
        run: docker build ./forward-proxy --tag forward-proxy:ci

      - name: Export image
        run: docker save forward-proxy:ci | gzip > /tmp/forward-proxy-ci.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: forward-proxy-image
          path: /tmp/forward-proxy-ci.tar.gz
          retention-days: 1

  lint:
    name: Config lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Allowlist format
        run: |
          python3 - <<'EOF'
          import re, sys
          errors = []
          with open("src/catraz/assets/config/allowlist.txt") as f:
              for lineno, raw in enumerate(f, 1):
                  line = raw.rstrip("\n")
                  if line.startswith("#") or not line.strip():
                      continue
                  if re.search(r"\s", line):
                      errors.append(f"line {lineno}: whitespace in entry: {line!r}")
                  if line.startswith(".") and line.count(".") < 2:
                      errors.append(f"line {lineno}: suspicious single-label .domain: {line!r}")
          for e in errors:
              print(e, file=sys.stderr)
          sys.exit(bool(errors))
          EOF

      - name: squid.conf sanity checks
        run: |
          # Required lines: port, default-deny, no cache
          grep -q '^http_port'             src/catraz/assets/config/squid.conf || { echo "FAIL: http_port missing"; exit 1; }
          grep -q '^http_access deny all'  src/catraz/assets/config/squid.conf || { echo "FAIL: default-deny missing"; exit 1; }
          grep -q '^cache deny all'        src/catraz/assets/config/squid.conf || { echo "FAIL: cache deny all missing"; exit 1; }
          # SNI-peek must come before ssl_bump splice
          peek_line=$(grep -n '^ssl_bump peek'   src/catraz/assets/config/squid.conf | head -1 | cut -d: -f1)
          splice_line=$(grep -n '^ssl_bump splice' src/catraz/assets/config/squid.conf | head -1 | cut -d: -f1)
          [ -n "$peek_line" ] && [ -n "$splice_line" ] || { echo "FAIL: ssl_bump peek/splice missing"; exit 1; }
          [ "$peek_line" -lt "$splice_line" ] || { echo "FAIL: ssl_bump peek must come before splice"; exit 1; }
          echo "squid.conf: all checks passed"

  smoke:
    name: Proxy smoke tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: forward-proxy-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/forward-proxy-ci.tar.gz

      - name: Start proxy
        run: |
          mkdir -p /tmp/squid-logs
          docker run -d --name squid-ci \
            -p 3128:3128 \
            -v "$PWD/src/catraz/assets/config/squid.conf:/etc/squid/squid.conf:ro" \
            -v "$PWD/src/catraz/assets/config/allowlist.txt:/etc/squid/allowlist.txt:ro" \
            -v "/tmp/squid-logs:/var/log/squid" \
            --tmpfs /var/spool/squid \
            --tmpfs /var/run \
            --tmpfs /tmp \
            forward-proxy:ci

      - name: Wait for proxy readiness
        run: |
          # 1) TCP port open
          up=0
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/127.0.0.1/3128' 2>/dev/null; then
              up=1; echo "Port up after ${i}s"; break
            fi
            sleep 1
          done
          [ "$up" = 1 ] || { echo "Proxy port not open after 30 s"; docker logs squid-ci; exit 1; }
          # 2) ssl-bump/certgen warm-up: the first CONNECT+Peek right after startup is
          #    reset while the certgen helpers are still starting (cold start). Therefore
          #    wait for a real, allowlisted splice connection rather than just the port —
          #    otherwise the first ALLOW test hits the warm-up window (curl 56).
          for i in $(seq 1 30); do
            if code=$(curl -sS --proxy http://127.0.0.1:3128 -m 15 -o /dev/null -w '%{http_code}' https://pypi.org/ 2>/dev/null) \
               && [ "$code" = "200" ]; then
              echo "Splice-ready nach ${i} Probe(s) (pypi=$code)"; exit 0
            fi
            sleep 1
          done
          echo "Proxy did not become splice-ready within 30 attempts"
          docker logs squid-ci
          exit 1

      # ── Allowed targets (Allowlist) ─────────────────────────────────────────

      - name: "ALLOW — pypi.org"
        run: |
          # Capture rc separately via `|| rc=$?`: under `bash -e`, `code=$(curl …)`
          # would abort immediately with curl's exit code on failure (instead of reporting FAIL).
          # Small retry to handle transient egress blips (recv-failure == curl 56).
          ok=0
          for i in 1 2 3; do
            rc=0; code=$(curl -sS --proxy http://127.0.0.1:3128 -m 20 -o /dev/null -w '%{http_code}' \
                     https://pypi.org/ 2>/dev/null) || rc=$?
            echo "try$i rc=$rc code=$code"
            [ "$rc" -eq 0 ] && [ -n "$code" ] && [ "$code" -ge 200 ] && [ "$code" -lt 500 ] && { ok=1; break; }
            sleep 2
          done
          [ "$ok" = 1 ] || { echo "FAIL: expected allowed, got rc=$rc code=$code"; exit 1; }

      - name: "ALLOW — registry.npmjs.org"
        run: |
          ok=0
          for i in 1 2 3; do
            rc=0; code=$(curl -sS --proxy http://127.0.0.1:3128 -m 20 -o /dev/null -w '%{http_code}' \
                     https://registry.npmjs.org/ 2>/dev/null) || rc=$?
            echo "try$i rc=$rc code=$code"
            [ "$rc" -eq 0 ] && [ -n "$code" ] && [ "$code" -ge 200 ] && [ "$code" -lt 500 ] && { ok=1; break; }
            sleep 2
          done
          [ "$ok" = 1 ] || { echo "FAIL: expected allowed, got rc=$rc code=$code"; exit 1; }

      # ── Blocked targets (default-deny + SNI-terminate) ──────────────────────

      - name: "DENY — example.com (not allowlisted)"
        run: |
          # `|| rc=$?`: a blocked target causes curl to fail (terminate→reset, curl 56) —
          # under `bash -e` this would abort the step before the PASS check runs.
          rc=0; code=$(curl --proxy http://127.0.0.1:3128 -m 10 -sS -o /dev/null -w '%{http_code}' \
                   https://example.com/ 2>/dev/null) || rc=$?
          echo "rc=$rc code=$code"
          { [ "$rc" -ne 0 ] || [ "$code" = "403" ] || [ "$code" = "503" ]; } \
            && echo "PASS" \
            || { echo "FAIL: expected block, got rc=$rc code=$code"; exit 1; }

      - name: "DENY — IP-Literal (no dstdomain match)"
        run: |
          rc=0; code=$(curl --proxy http://127.0.0.1:3128 -m 10 -sS -o /dev/null -w '%{http_code}' \
                   https://1.1.1.1/ 2>/dev/null) || rc=$?
          echo "rc=$rc code=$code"
          { [ "$rc" -ne 0 ] || [ "$code" = "403" ] || [ "$code" = "503" ]; } \
            && echo "PASS" \
            || { echo "FAIL: expected block, got rc=$rc code=$code"; exit 1; }

      - name: "DENY — non-safe port (:8443)"
        run: |
          rc=0; code=$(curl --proxy http://127.0.0.1:3128 -m 10 -sS -o /dev/null -w '%{http_code}' \
                   https://pypi.org:8443/ 2>/dev/null) || rc=$?
          echo "rc=$rc code=$code"
          { [ "$rc" -ne 0 ] || [ "$code" = "403" ] || [ "$code" = "503" ]; } \
            && echo "PASS" \
            || { echo "FAIL: expected block, got rc=$rc code=$code"; exit 1; }

      - name: "DENY — plain HTTP non-allowlisted"
        run: |
          rc=0; code=$(curl --proxy http://127.0.0.1:3128 -m 10 -sS -o /dev/null -w '%{http_code}' \
                   http://evil.example.net/ 2>/dev/null) || rc=$?
          echo "rc=$rc code=$code"
          { [ "$rc" -ne 0 ] || [ "$code" = "403" ] || [ "$code" = "503" ]; } \
            && echo "PASS" \
            || { echo "FAIL: expected block, got rc=$rc code=$code"; exit 1; }

      # ── Audit log: blocks must be visible ───────────────────────────────────

      - name: Audit log — blocked requests visible
        run: |
          sleep 2
          # The log file is owned by the container user `proxy` (uid from DEV_UID, mode 0640)
          # and is not readable on the host with a different runner uid. Therefore read it from
          # inside the container (no USER in image → docker exec runs as root).
          docker exec squid-ci cat /var/log/squid/access.log > /tmp/access.log
          echo "=== access.log ==="
          cat /tmp/access.log
          grep -Eq 'example\.(com|net)|1\.1\.1\.1' /tmp/access.log \
            && echo "PASS: denied requests in audit log" \
            || { echo "FAIL: denied requests missing from access.log"; exit 1; }

      - name: Dump container logs
        if: always()
        run: docker logs squid-ci

      - name: Cleanup
        if: always()
        run: docker rm -f squid-ci || true
