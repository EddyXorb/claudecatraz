name: release

# Two ways to draft a release:
#   1. Push a semver tag (e.g. v0.2.0) — changelog covers commits up to that tag.
#   2. Trigger manually via Actions UI — provide the target version; the tag is
#      created by gh when the draft release is saved (no need to push a tag first).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # git-cliff needs full history + tags to diff against the prior tag.
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches pyproject.toml version
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          pyproject_ver=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag_ver="${TAG#v}"
          if [ "$pyproject_ver" != "$tag_ver" ]; then
            echo "ERROR: pyproject.toml version '$pyproject_ver' does not match tag '$TAG'"
            exit 1
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          # --current needs a tag on HEAD; for manual runs use --unreleased instead.
          args: ${{ github.event_name == 'workflow_dispatch' && '--unreleased --strip all' || '--current --strip all' }}

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
          NOTES: ${{ steps.cliff.outputs.content }}
        run: |
          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes "$NOTES"
