name: warden CI

# Only the warden package is checked for now.
on:
  push:
    paths:
      - "warden/**"
      - ".github/workflows/warden-ci.yml"
  pull_request:
    paths:
      - "warden/**"
      - ".github/workflows/warden-ci.yml"

defaults:
  run:
    working-directory: warden

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy --strict)
        run: uv run mypy

      - name: Tests
        run: uv run pytest -q
