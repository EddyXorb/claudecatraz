name: audit

# Scan resolved dependencies (runtime + dev) for known vulnerabilities via
# pip-audit against the warden uv lockfile (the package carrying the real
# third-party runtime deps; the repo root deliberately does not version a
# lockfile). Runs weekly so newly disclosed CVEs in already-pinned packages
# surface even without a code change.
on:
  push:
    paths:
      - "warden/uv.lock"
      - "warden/pyproject.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "warden/uv.lock"
      - "warden/pyproject.toml"
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

defaults:
  run:
    working-directory: warden

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Export locked dependencies
        run: uv export --frozen --all-groups --format requirements-txt --no-emit-project > requirements.txt

      - name: Audit for known vulnerabilities
        run: uvx pip-audit -r requirements.txt
