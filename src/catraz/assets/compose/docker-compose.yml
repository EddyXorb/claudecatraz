secrets:
  # Grouped, forge-agnostic, one file per capability — `<host> <token>` per
  # line (§4.1). Adding a host = one line here + one [[git.endpoint]] in
  # warden.toml, never a compose edit.
  read_tokens:
    file: ${PROJECT_DIR}/.catraz/secrets/read_tokens
  write_tokens:
    file: ${PROJECT_DIR}/.catraz/secrets/write_tokens

services:
  gitlab-warden:
    build:
      # Absolute, anchored at the extracted asset cache. A relative `../warden` would be
      # resolved by compose against --project-directory (the user's repo), not this file's
      # dir — CATRAZ_ASSETS (set in compose.run) makes it independent of project-directory.
      context: ${CATRAZ_ASSETS:?CATRAZ_ASSETS unset — run via the catraz CLI}/warden
      dockerfile: Dockerfile
      args:
        DEV_UID: ${DEV_UID:-1000}
    secrets: [read_tokens, write_tokens]
    environment:
      # Tokens arrive via compose secrets (file-based, /run/secrets/…) — not env
      # vars. Grouped, host-keyed files (§4.1): the warden resolves each
      # [[git.endpoint]] host's read/write token from these two files.
      - READ_TOKENS_FILE=/run/secrets/read_tokens
      - WRITE_TOKENS_FILE=/run/secrets/write_tokens
      # Admin/Viewer via Unix socket (Commit 2.4) — no subnet/no fixed IP anymore.
      # ADMIN_UDS is the authoritative source of the admin socket path.
      # The host-side CLI path (.catraz/state/warden/run/admin.sock in observe.py/doctor.py)
      # mirrors it by contract (bind-mount: host .catraz/state/warden/run → container /run/warden).
      - ADMIN_UDS=/run/warden/admin.sock
      # Non-secret policy — SOURCE OF TRUTH is config/warden.toml exclusively
      # ([git.rules] + [[git.endpoint]], §3.5): no env overrides left here.
    volumes:
      # Bind-mounts instead of named volumes → SQLite state + audit JSONL auditable
      # without Docker tools (W12). DEV_UID controls ownership so the host user can read.
      - ${PROJECT_DIR}/.catraz/state/warden/db:/var/lib/warden
      - ${PROJECT_DIR}/.catraz/logs/warden:/var/log/warden
      - ${PROJECT_DIR}/.catraz/config/warden.toml:/etc/warden/warden.toml:ro
      - ${PROJECT_DIR}/.catraz/state/warden/run:/run/warden   # Socket directory (file is created at runtime)
    networks: [agent-net, egress-net]
    healthcheck:
      test: ["CMD","python3","-c","import os,socket;socket.socket(socket.AF_UNIX).connect(os.environ.get('ADMIN_UDS','/run/warden/admin.sock'))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    # Defense-in-depth: warden holds the GitLab tokens — block any setuid/setgid
    # privilege escalation inside the container regardless of base-image contents.
    security_opt:
      - no-new-privileges:true
    restart: on-failure:2

  # ── Forward-Proxy (Research/Build-Egress, holds NO credentials) ─────────────
  # docs/design/agentic-workflow/02-forward-proxy/03-deployment.md
  forward-proxy:
    build:
      context: ${CATRAZ_ASSETS:?CATRAZ_ASSETS unset — run via the catraz CLI}/forward-proxy   # Squid with OpenSSL/ssl_bump support
      args:
        DEV_UID: ${DEV_UID:-1000}               # Audit log readable on host (README §11.6)
    networks: [agent-net, egress-net]
    volumes:
      # host-editable config, read-only (central config/ folder, README §11):
      - ${PROJECT_DIR}/.catraz/config/squid.conf:/etc/squid/squid.conf:ro
      - ${PROJECT_DIR}/.catraz/config/allowlist.txt:/etc/squid/allowlist.txt:ro
      - ${PROJECT_DIR}/.catraz/logs/squid:/var/log/squid   # Bind-mount: egress audit (access.log)
    read_only: true
    tmpfs:
      - /var/spool/squid
      - /var/run
      - /tmp
    healthcheck:
      # TCP liveness check on the squid port (SQUID_PORT default 3128). If you change
      # http_port in squid.conf, also set SQUID_PORT in .catraz/.env to match.
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/${SQUID_PORT:-3128}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    # Defense-in-depth: same setuid/setgid escalation block as the other services.
    security_opt:
      - no-new-privileges:true
    restart: on-failure:2

  claude-dev-env:
    # Agent daemon only starts under the `remote` profile: a profile-less `up`
    # brings up warden+squid only. `docker compose run claude-dev-env` (catraz local)
    # activates the service despite the profile.
    profiles: ["remote"]
    build:
      context: ${CATRAZ_ASSETS:?CATRAZ_ASSETS unset — run via the catraz CLI}
      # Per-agent-profile layer (§05.3): AGENT_PROFILE selects which
      # `assets/agents/<profile>/layer.Dockerfile` gets built — the ONE
      # adapter this image will carry (§06.2: no runtime adapter choice).
      dockerfile: agents/${AGENT_PROFILE:-claude}/layer.Dockerfile
      args:
        # Default to empty so a profile-less `up`/`down` (which interpolates this service
        # but never builds it) does not warn "BASE_IMAGE is not set". The agent is the only
        # consumer of the base (the agent layer: FROM ${BASE_IMAGE}); catraz run / up --remote
        # always inject the resolved value via extra_env, overriding this default.
        BASE_IMAGE: ${BASE_IMAGE:-}
        NODE_VERSION: ${NODE_VERSION:-22}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        DEV_UID: ${DEV_UID:-1000}
    # ONLY agent-net (internal) -> no direct internet/DNS route. Research/Build
    # traffic runs exclusively through the Forward-Proxy (02-network-isolation.md).
    networks: [agent-net]
    # The agent is treated as potentially malicious. The base image inherits setuid/
    # setgid binaries from Ubuntu (passwd, su, mount, ...) as a latent privilege-
    # escalation vector. no-new-privileges tells the kernel to grant NO privileges via
    # setuid/setgid on execve -> the bits may be set but become inert in this container.
    security_opt:
      - no-new-privileges:true
    environment:
      - AUTH_MODE=${AUTH_MODE}
      - AGENT_HOME=/home/dev/.claude
      # Agent runtime (advanced) — remote-control invocation tuning (claude-specific
      # env vars the adapter itself reads; see assets/agents/claude/adapter.py):
      - CLAUDE_RC_SPAWN=${CLAUDE_RC_SPAWN:-same-dir}
      - CLAUDE_RC_DEBUG_FILE=${CLAUDE_RC_DEBUG_FILE:-}
      - CLAUDE_RC_EXTRA_ARGS=${CLAUDE_RC_EXTRA_ARGS:-}
      # Research/Build egress via the Forward-Proxy (§6.6):
      - http_proxy=http://forward-proxy:${SQUID_PORT:-3128}
      - https_proxy=http://forward-proxy:${SQUID_PORT:-3128}
      - HTTP_PROXY=http://forward-proxy:${SQUID_PORT:-3128}
      - HTTPS_PROXY=http://forward-proxy:${SQUID_PORT:-3128}
      # Fallback only — loopback never goes through the proxy. catraz overwrites
      # this (same key, later -f layer) with every configured [[git.endpoint]]
      # host so REST calls to the Warden aren't intercepted by the forward
      # proxy (§1.2); see compose.py's generated `.catraz/compose.hosts.yml`.
      - no_proxy=localhost,127.0.0.1
      - NO_PROXY=localhost,127.0.0.1
      # Generic per-host REST rule (§1.2), not one concrete URL: "<host>" is a
      # literal placeholder the rendered instructions ask the agent to
      # substitute — the same rule holds for gitlab.com, a self-hosted
      # instance, or any other configured [[git.endpoint]] host, so this
      # never needs to change per host and never names the Warden container.
      # No token in the agent container (R6/W9.3); host list + credentials
      # live only in warden.toml/.catraz/secrets (§3.5).
      - WARDEN_REST_URL=http://<host>:8080/api/v4
      - WARDEN_BRANCH_PREFIX=${WARDEN_BRANCH_PREFIX:-}
      # The rendered instructions file (§05.2 render_instructions) is required by
      # default so a missing/misconfigured adapter fails loud in the entrypoint
      # instead of starting the agent without its user-memory. A bare `docker run`
      # of the image leaves this unset and may start without instructions (local
      # image testing). See entrypoint.install_instructions().
      - REQUIRE_AGENT_INSTRUCTIONS=true
    volumes:
      - type: bind
        source: ${PROJECT_DIR}
        target: /workspace
      - type: tmpfs
        target: /workspace/.catraz
        tmpfs: { size: 1048576, mode: 0700 }
      - type: tmpfs
        target: /home/dev/.claude
      # Writable per-repo agent state (§05.6, credentials.mode = "persistent"):
      # always mounted (harmless if the active profile ignores it) so the same
      # compose file serves every profile; the adapter decides whether/how to
      # wire it into the live home (assets/agents/claude/adapter.py:_wire_persistent).
      - type: bind
        source: ${PROJECT_DIR}/.catraz/state/${AGENT_PROFILE:-claude}
        target: /var/lib/agent-state
      # Host git identity (user.name/email, etc.), copied to the writable ~/.gitconfig
      # at startup so the agent can commit. Staged read-only under .ro/ because the
      # entrypoint's warden setup appends insteadOf rules to the live ~/.gitconfig — a
      # read-only mount there would make that write fail. /dev/null when HOST_GITCONFIG
      # is unset (no host gitconfig); the entrypoint skips the empty staged file.
      - type: bind
        source: ${HOST_GITCONFIG:-/dev/null}
        target: /home/dev/.claude/.ro/.gitconfig
        read_only: true
      # Non-secret warden policy (branch_prefixes, allowed_projects, quotas), read-only.
      # Lets the agent discover its ACTUAL limits — especially custom branch_prefixes —
      # instead of assuming the claude/ default; the rendered CLAUDE.md (§05.2
      # render_instructions) points the agent here. This is
      # the very file the warden enforces from, so the agent's view can't drift from the
      # rules. The mount is read-only and purely advisory: the warden reads its own copy
      # and stays the sole enforcer, and no secrets live here (the GitLab tokens are in
      # .catraz/secrets/, never in warden.toml).
      - type: bind
        source: ${PROJECT_DIR}/.catraz/config/warden.toml
        target: /etc/catraz/warden.toml
        read_only: true
      # Host-persistent agent debug logs (--debug-file style). The live home is a
      # tmpfs, so the remote-control daemon's rc-debug.log and `catraz run`'s
      # run-debug.log would vanish on exit; this bind keeps them on the host next
      # to logs/warden + logs/squid. The entrypoint resolves this generically
      # (entrypoint.resolve_log_dir()) and exports it as AGENT_LOG_DIR for the
      # adapter to use. This is the only host-writable path the agent has outside
      # /workspace — deliberately scoped to a logs dir; doctor creates it and
      # chowns it to DEV_UID so the dev user can write.
      - type: bind
        source: ${PROJECT_DIR}/.catraz/logs/${AGENT_PROFILE:-claude}
        target: /var/log/agent-debug
    # Network isolation (agent-net internal: true + forward-proxy for http_proxy) is
    # activated in stage 03 once the Forward-Proxy service is in Compose.
    # Until then: default bridge (internet access for api.anthropic.com).
    # No `command:` — the agent layer sets ENTRYPOINT ["python3","/entrypoint.py"].
    working_dir: /workspace
    tty: true
    stdin_open: true
    restart: no
    depends_on:
      forward-proxy:
        condition: service_healthy
      gitlab-warden:
        condition: service_healthy

networks:
  agent-net:  { internal: true }   # NO egress — agent reaches only the proxy (+ MCP sidecars)
  egress-net: {}                   # Internet — only Forward-Proxy & MCP sidecars
