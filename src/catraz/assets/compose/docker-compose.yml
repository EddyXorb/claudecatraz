services:
  gitlab-warden:
    build:
      context: ../warden
      dockerfile: Dockerfile
      args:
        DEV_UID: ${DEV_UID:-1000}
    environment:
      # Secrets + infra — env only, never the agent (R6):
      - GITLAB_READ_TOKEN=${GITLAB_READ_TOKEN}
      - GITLAB_WRITE_TOKEN=${GITLAB_WRITE_TOKEN}
      - GITLAB_URL=${GITLAB_URL:-https://gitlab.com}
      # Admin/Viewer über Unix-Socket (Commit 2.4) — kein Subnetz/keine feste IP mehr.
      - ADMIN_UDS=/run/warden/admin.sock
      # Non-secret policy — SOURCE OF TRUTH is config/warden.toml. The vars below
      # OVERRIDE the toml only when set (non-empty); leave empty to use warden.toml.
      - ALLOWED_PROJECTS=${WARDEN_ALLOWED_PROJECTS:-}
      - BRANCH_PREFIX=${WARDEN_BRANCH_PREFIX:-}
      - MAX_OPEN_MRS=${WARDEN_MAX_OPEN_MRS:-}
      - MAX_OPEN_BRANCHES=${WARDEN_MAX_OPEN_BRANCHES:-}
      - MAX_WRITES_PER_HOUR=${WARDEN_MAX_WRITES_PER_HOUR:-}
    volumes:
      # Bind-Mounts statt Named Volumes → SQLite-State + Audit-JSONL ohne Docker-Tools
      # auditierbar (W12). DEV_UID steuert Owner, damit Host-User lesen kann.
      - ${PROJECT_DIR}/.catraz/state/warden:/var/lib/warden
      - ${PROJECT_DIR}/.catraz/logs/warden:/var/log/warden
      - ${PROJECT_DIR}/.catraz/config/warden.toml:/etc/warden/warden.toml:ro
      - ${PROJECT_DIR}/.catraz/run/warden:/run/warden   # Socket-Verzeichnis (Datei entsteht zur Laufzeit)
    networks: [agent-net, egress-net]
    healthcheck:
      test: ["CMD","python3","-c","import socket;socket.socket(socket.AF_UNIX).connect('/run/warden/admin.sock')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Forward-Proxy (Research/Build-Egress, haelt KEINE Credentials) ──────────
  # docs/design/agentic-workflow/02-forward-proxy/03-deployment.md
  forward-proxy:
    build:
      context: ../forward-proxy                 # Squid mit OpenSSL/ssl_bump-Support
      args:
        DEV_UID: ${DEV_UID:-1000}               # Audit-Log host-lesbar (README §11.6)
    networks: [agent-net, egress-net]
    volumes:
      # host-editierbare Config, read-only (zentraler config/-Ordner, README §11):
      - ${PROJECT_DIR}/.catraz/config/squid.conf:/etc/squid/squid.conf:ro
      - ${PROJECT_DIR}/.catraz/config/allowlist.txt:/etc/squid/allowlist.txt:ro
      - ${PROJECT_DIR}/.catraz/logs/squid:/var/log/squid   # Bind-Mount: Egress-Audit (access.log)
    read_only: true
    tmpfs:
      - /var/spool/squid
      - /var/run
      - /tmp
    healthcheck:
      # TCP-Liveness von 3128 (dependency-arm, version-stabil). Die im Design
      # genannte squidclient-mgr-Variante braeuchte eine manager-ACL — fuer reine
      # Liveness genuegt der Port-Check.
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3128"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  claude-dev-env:
    build:
      context: ..
      dockerfile: claude-layer/Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE}
        NODE_VERSION: ${NODE_VERSION:-22}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        DEV_UID: ${DEV_UID:-1000}
    # NUR agent-net (internal) -> keine eigene Internet-/DNS-Route. Research/Build
    # laeuft ausschliesslich ueber den Forward-Proxy (02-network-isolation.md).
    networks: [agent-net]
    environment:
      - AUTH_MODE=${AUTH_MODE}
      # Research/Build-Egress ueber den Forward-Proxy (§6.6):
      - http_proxy=http://forward-proxy:3128
      - https_proxy=http://forward-proxy:3128
      - HTTP_PROXY=http://forward-proxy:3128
      - HTTPS_PROXY=http://forward-proxy:3128
      # gitlab-warden direkt (kein Proxy); loopback ebenfalls.
      - no_proxy=gitlab-warden,localhost,127.0.0.1
      - NO_PROXY=gitlab-warden,localhost,127.0.0.1
      # Kanonische GitLab-URL fuer den insteadOf-Rewrite auf gitlab-warden (entrypoint.py).
      # Kein Token im Agent-Container (R6/W9.3).
      - GITLAB_URL=${GITLAB_URL:-https://gitlab.com}
    volumes:
      - type: bind
        source: ${PROJECT_DIR}
        target: /workspace
      - type: tmpfs
        target: /workspace/.catraz
        tmpfs: { size: 1048576, mode: 0700 }
      - type: tmpfs
        target: /home/dev/.claude
    # Network isolation (agent-net internal: true + forward-proxy für http_proxy) wird
    # in Stufe 03 aktiviert, sobald der Forward-Proxy-Service im Compose steht.
    # Bis dahin: Default-Bridge (Internet-Zugriff für api.anthropic.com).
    # Kein `command:` — der claude-layer setzt ENTRYPOINT ["python3","/entrypoint.py"].
    working_dir: /workspace
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      forward-proxy:
        condition: service_healthy
      gitlab-warden:
        condition: service_healthy

networks:
  agent-net:  { internal: true }   # KEIN Egress — Agent erreicht nur Proxy (+ MCP-Sidecars)
  egress-net: {}                   # Internet — nur Forward-Proxy & MCP-Sidecars
