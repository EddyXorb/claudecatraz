# Forward-Proxy (Squid) — Research/Build-Egress, default-deny allowlist.
# Implements docs/design/agentic-workflow/02-forward-proxy/03-squid-config.md.
#
# Host-editable, mounted read-only into the container (README §11). NO secrets.
# Squid runs as PID 1 here; apply edits with `catraz reload`, not `squid -k`.

# --- Listen, internal only (agent-net) ---
# `ssl-bump` activates the peek/splice engine; `tls-cert` is init material only,
# it is NEVER presented to the client during splicing (no CA in the agent, §3).
# If you change this port, also set `SQUID_PORT` in `.catraz/.env` to match.
http_port 3128 ssl-bump tls-cert=/etc/squid/ssl/bump.pem
visible_hostname forward-proxy

# certgen helper: Squid starts it when ssl-bump is active, even when we only
# peek/splice (never bump). DB lives on tmpfs, initialized by the entrypoint.
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/spool/squid/ssl_db -M 4MB
sslcrtd_children 4

# --- ACL basics (localhost/all are Squid built-ins) ---
acl safe_ports port 80 443
acl CONNECT method CONNECT

# --- Allowlist from file (one domain per line, .domain = incl. subdomains) ---
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# --- SNI peek for HTTPS (no bump/decrypt) ---
acl step1 at_step SslBump1
ssl_bump peek step1
acl allowed_sni ssl::server_name "/etc/squid/allowlist.txt"
ssl_bump splice allowed_sni        # allowed SNI -> pass through, do NOT decrypt
ssl_bump terminate all             # everything else: terminate the connection

# --- Restrict ports: only 80/443 ---
http_access deny CONNECT !safe_ports

# --- Plain-HTTP / CONNECT: only allowed hosts ---
# TCP_RESET on denial: a bump-and-error-page response here would present our
# bump CA, which an unmodified client rejects as SELF_SIGNED_CERT_IN_CHAIN.
deny_info TCP_RESET all
http_access allow allowed_domains
http_access deny all               # DEFAULT-DENY

# --- No caching (avoid cache poisoning/disk), filter + audit only ---
cache deny all

# --- Audit log: every connection, machine-readable (time, client, status, method, URL, SNI) ---
logformat audit %{%Y-%m-%dT%H:%M:%S}tg.%03tuZ %>a %Ss/%03>Hs %<st %rm %ru %ssl::>sni
access_log stdio:/var/log/squid/access.log audit

# --- DNS: deterministic via the Docker resolver (egress-net). Optionally hardcode:
# dns_nameservers 1.1.1.1 8.8.8.8

# --- Operation (read-only root FS: PID/spool/tmp live on tmpfs) ---
pid_filename /var/run/squid.pid
shutdown_lifetime 5 seconds
