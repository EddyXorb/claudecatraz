# Warden — non-secret policy parameters. SOURCE OF TRUTH for these settings.
# Host-editable, mounted read-only. Details: docs/design/agentic-workflow/02-warden.md (W10)
#
# Precedence: a matching env var in .catraz/.env OVERRIDES the value here when set
# (non-empty):
#   branch_prefixes     <- WARDEN_BRANCH_PREFIX  (comma-separated for more than one)
#   max_open_mrs        <- WARDEN_MAX_OPEN_MRS
#   max_open_branches   <- WARDEN_MAX_OPEN_BRANCHES
#   max_writes_per_hour <- WARDEN_MAX_WRITES_PER_HOUR
#   allowed_projects    <- WARDEN_ALLOWED_PROJECTS  (comma-separated)
# Leave the env var empty/unset to use the value below. This file holds NO secrets:
# the GitLab tokens live in .catraz/secrets/ (one file each, mounted as compose
# secrets); GITLAB_URL / GITLAB_MODE live in .catraz/.env — never put any here.

# R2: only branches under one of these prefixes may be pushed (the allowed
# namespace is the union of the list). Legacy single-prefix form still works:
#   branch_prefix = "claude/"
branch_prefixes     = ["claude/"]
max_open_mrs        = 5                   # R5: max simultaneously open MRs
max_open_branches   = 10                  # R5: max simultaneously existing branches
max_writes_per_hour = 60                  # R5: max write actions per hour

# Full paths of concrete projects only — NO wildcards/globs, NO partial/leaf names,
# NO group prefixes. Empty = fail-closed (nothing allowed).
allowed_projects    = []

# --- Multi-target endpoint taxonomy (docs/design/architecture-generalization/
# 08-multi-target.md) — additive preview, not yet enforced by any guard; the
# settings above are still what's live. [git.rules] holds the same
# domain-default knobs as above (branch_prefixes, max_open_branches,
# max_open_mrs, max_writes_per_hour, max_push_bytes), scoped to the endpoint
# model; each [[git.endpoint]] table configures exactly one git host, with an
# optional per-endpoint `rules = { ... }` overriding a [git.rules] default for
# that host only. Tokens are NEVER set here — they live in the grouped
# .catraz/secrets/read_tokens / write_tokens files (<host> <token> per line).
#
# Implemented `type` values:
#   "gitlab" — git + REST API (gitlab.com or self-hosted GitLab)
#   "plain"  — git smart-HTTP only, no REST API assumed
# "github" is reserved for a future guard — the Warden refuses to start if used.
[git.rules]
# branch_prefixes = ["claude/"]

# Example — add one [[git.endpoint]] table per host.
# [[git.endpoint]]
# host             = "gitlab.com"
# type             = "gitlab"
# allowed_projects = []
