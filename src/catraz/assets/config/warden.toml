# Warden — non-secret policy parameters. SOURCE OF TRUTH for these settings.
# Host-editable, mounted read-only. Details: docs/design/agentic-workflow/02-warden.md (W10)
#
# Precedence: a matching env var OVERRIDES the value here when set (non-empty):
#   branch_prefix       <- BRANCH_PREFIX
#   max_open_mrs        <- MAX_OPEN_MRS
#   max_open_branches   <- MAX_OPEN_BRANCHES
#   max_writes_per_hour <- MAX_WRITES_PER_HOUR
#   allowed_projects    <- ALLOWED_PROJECTS  (comma-separated)
# Leave the env var empty/unset to use the value below. Secrets (GITLAB_READ_TOKEN /
# GITLAB_WRITE_TOKEN) and GITLAB_URL come from .env only — never put them here.

branch_prefix       = "claude/"          # R2: only branches with this prefix may be pushed
max_open_mrs        = 5                   # R5: max simultaneously open MRs
max_open_branches   = 10                  # R5: max simultaneously existing branches
max_writes_per_hour = 60                  # R5: max write actions per hour

# Full paths of concrete projects only — NO wildcards/globs, NO partial/leaf names,
# NO group prefixes. Empty = fail-closed (nothing allowed).
allowed_projects    = []
