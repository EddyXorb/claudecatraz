# Warden non-secret policy — SOURCE OF TRUTH, host-editable, mounted read-only.
# Full action vocabulary + endpoint guide: .catraz/config/README.md. NO secrets
# here — GitLab tokens live in .catraz/secrets/read_tokens / write_tokens.

# Domain default: what the agent may DO on a git host (the twelve "yes" actions).
# Closed set; per-host override via a [[git.endpoint]] `actions` key (see README).
[git]
actions = [
  "repo.read", "repo.branch.create", "repo.branch.push",
  "project.read", "project.mr.create", "project.mr.edit", "project.mr.close",
  "project.mr.comment", "project.ci.trigger",
  "instance.projects.read", "instance.users.read", "instance.meta.read",
]

# Domain-default quotas + branch namespace for every endpoint; a host narrows
# any of these under its own [[git.endpoint]] `rules = { ... }` (see README).
[git.rules]
branch_prefixes     = ["claude/"]        # branches pushable only under these prefixes
max_open_mrs        = 5                   # max simultaneously open MRs
max_open_branches   = 10                  # max simultaneously existing branches
max_writes_per_hour = 60                  # max write actions per hour
max_push_bytes      = 10485760            # max bytes per push (10 MiB)

# Which hosts the agent may reach: one [[git.endpoint]] per host (type =
# "gitlab"|"plain"). `catraz init` offers to add one; none ships by default (no
# endpoint = no host routed). allowed_projects is per endpoint — concrete
# project paths only, no wildcards/leaf/group names; empty = fail-closed
# (every GitLab op on that host denied until you add one, or `catraz allow`).
# Example + full docs: .catraz/config/README.md.
# [[git.endpoint]]
# host = "gitlab.com"
# type = "gitlab"
# allowed_projects = []
